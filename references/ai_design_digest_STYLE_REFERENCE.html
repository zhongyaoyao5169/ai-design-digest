<!-- ======== LOCKED JS STYLE FUNCTIONS ======== -->
<script id="aid-js-locked">
/*
 * aidApplyTabStyle
 * Stat tab 激活态强制写入 — isActive=true: 珊瑚 #CC785C 背景 + 白字
 */
function aidApplyTabStyle(el, isActive) {
  var n = el.querySelector(".aid-stab-n"), l = el.querySelector(".aid-stab-l");
  if (isActive) {
    el.style.cssText = "background:#CC785C !important;border:1px solid #CC785C !important;border-radius:14px;padding:1rem 1.1rem .9rem;text-align:left;cursor:pointer;font-family:sans-serif;outline:none;";
    n.style.cssText = "color:#ffffff !important;font-family:'Georgia',serif;font-size:24px;font-weight:400;line-height:1;margin-bottom:.35rem;";
    l.style.cssText = "color:rgba(255,255,255,0.75) !important;font-size:12px;line-height:1.3;";
  } else {
    el.style.cssText = "background:#FDFCFB;border:1px solid #E1E1DF;border-radius:14px;padding:1rem 1.1rem .9rem;text-align:left;cursor:pointer;font-family:sans-serif;outline:none;";
    n.style.cssText = "color:#1A1A18;font-family:'Georgia',serif;font-size:24px;font-weight:400;line-height:1;margin-bottom:.35rem;";
    l.style.cssText = "color:#6B6860;font-size:12px;line-height:1.3;";
  }
}

/*
 * aidApplyLangStyle
 * 语言切换激活态 — 关键：border-right 单独写（不可用 border:none 整体覆盖，否则分割线消失）
 */
function aidApplyLangStyle(btns, activeIdx) {
  btns.forEach(function(btn, i) {
    var divider = i < btns.length - 1 ? "border-right:1px solid rgba(26,26,24,.16);" : "";
    if (i === activeIdx) {
      btn.style.cssText = "background:#1A1A18 !important;color:#ffffff !important;font-weight:500;font-size:12px;padding:6px 16px;border-top:none;border-bottom:none;border-left:none;cursor:pointer;font-family:sans-serif;border-radius:0 !important;outline:none;" + divider;
    } else {
      btn.style.cssText = "background:transparent !important;color:#6B6860;font-weight:400;font-size:12px;padding:6px 16px;border-top:none;border-bottom:none;border-left:none;cursor:pointer;font-family:sans-serif;border-radius:0 !important;outline:none;" + divider;
    }
  });
}

/*
 * aidSetLang / aidSetTab — 事件处理函数，按钮 onclick 调用
 * 必须与 aidApplyTabStyle / aidApplyLangStyle 一起带入每次渲染
 */
function aidSetLang(l, idx) {
  aidLang = l;
  aidApplyLangStyle(Array.from(document.querySelectorAll(".aid-lt")), idx);
  aidRender();
}
function aidSetTab(t, el) {
  aidTab = t;
  Array.from(document.querySelectorAll(".aid-stab")).forEach(function(btn) {
    aidApplyTabStyle(btn, btn === el);
  });
  aidRender();
}

/*
 * 初始化调用（aidRender() 完成后立即执行）：
 *
 * aidRender();
 * var allTabs = Array.from(document.querySelectorAll(".aid-stab"));
 * aidApplyTabStyle(allTabs[0], true);
 * allTabs.slice(1).forEach(function(btn){ aidApplyTabStyle(btn, false); });
 * aidApplyLangStyle(Array.from(document.querySelectorAll(".aid-lt")), 0);
 */
</script>
